# ─────────────────────────────────────────────────────────────────────────────
# render.yml  —  BeatVerse Bot  |  Render FREE tier  (Web Service + Docker)
# ─────────────────────────────────────────────────────────────────────────────
#
# WHY type: web (not worker)?
#   Render's free tier only supports Static Sites, Web Services, Postgres,
#   and Key Value.  "worker" type requires a paid plan.
#   The health.py module inside the bot starts a tiny HTTP server on $PORT
#   so Render's health-check passes and the deployment stays alive.
#
# KEEP-ALIVE TIP (prevents 15-min auto-sleep on free tier):
#   1. Go to https://uptimerobot.com → Add Monitor
#   2. Type: HTTP(s)   URL: https://<your-app>.onrender.com/health
#   3. Interval: every 5 minutes
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web                         # ← free tier compatible
    name: beatversebot
    runtime: docker
    region: singapore                    # options: frankfurt | singapore | ohio
    plan: free
    dockerfilePath: ./Dockerfile

    healthCheckPath: /health          # served by health.py module

    envVars:

      # ── Required ───────────────────────────────────────────────────────────
      - key: PORT
        value: "10000"                # Render injects this; explicitly set too

      - key: ENV
        value: "True"

      - key: TOKEN
        sync: false

      - key: API_ID
        sync: false

      - key: API_HASH
        sync: false

      - key: OWNER_ID
        sync: false

      # ── Database (at least one recommended) ────────────────────────────────
      - key: DATABASE_URL
        sync: false

      - key: MONGO_DB_URI
        sync: false

      # ── Sessions ───────────────────────────────────────────────────────────
      - key: TELETHON_SESSION
        sync: false

      - key: PYROGRAM_SESSION
        sync: false

      # ── Bot config ─────────────────────────────────────────────────────────
      - key: SUPPORT_CHAT
        value: Beat_Anime_Discussion

      - key: EVENT_LOGS
        sync: false

      - key: START_PICS
        sync: false

      - key: HELP_PICS
        sync: false

      - key: ANIME_CHANNEL
        sync: false

      - key: CONTACT_ADMIN
        sync: false

      # ── API keys ───────────────────────────────────────────────────────────
      - key: CASH_API_KEY
        sync: false

      - key: TIME_API_KEY
        sync: false

      - key: WALL_API_KEY
        sync: false

      # ── Sudo/dev users ─────────────────────────────────────────────────────
      - key: DRAGONS
        sync: false

      - key: DEV_USERS
        sync: false

      - key: DEMONS
        sync: false

      - key: TIGERS
        sync: false

      - key: WOLVES
        sync: false

      # ── Feature flags ──────────────────────────────────────────────────────
      - key: ALLOW_CHATS
        value: "True"

      - key: ALLOW_EXCL
        value: "True"

      - key: DEL_CMDS
        value: "True"

      - key: STRICT_GBAN
        value: "True"

      - key: WORKERS
        value: "4"

      - key: TEMP_DOWNLOAD_DIRECTORY
        value: "./"

      - key: NO_LOAD
        value: "tagall telegraph backups dbcleanup country"
